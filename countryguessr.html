<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CountryGuessr</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1e;
  --surface: #0f1628;
  --border: #1e2d4a;
  --border2: #2a3f6a;
  --accent: #4f8ef7;
  --accent-dim: #1a2d5a;
  --green: #22c55e;
  --green-dim: #14532d;
  --red: #ef4444;
  --red-dim: #7f1d1d;
  --yellow: #eab308;
  --text: #e2e8f0;
  --muted: #64748b;
  --country-fill: #1e3a6e;
  --country-stroke: #4f8ef7;
  --capital-dot: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); overflow: hidden; -webkit-tap-highlight-color: transparent; }

/* star field bg */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,.1) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 85%, rgba(255,255,255,.08) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,.1) 0%, transparent 100%),
    radial-gradient(2px 2px at 50% 50%, rgba(79,142,247,.08) 0%, transparent 100%);
}

.app { display: flex; flex-direction: column; height: 100%; position: relative; z-index: 1; }

/* HEADER */
header {
  flex-shrink: 0; height: 52px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
}
.logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
.logo span { color: var(--text); font-weight: 400; }
.hud { display: flex; align-items: center; gap: 16px; }
.hud-block { text-align: right; }
.hud-lbl { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.hud-val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent); line-height: 1; }
.pips { display: flex; gap: 5px; }
.pip { width: 8px; height: 8px; border-radius: 2px; background: var(--border); border: 1px solid var(--border2); transition: all .3s; }
.pip.done { background: var(--accent-dim); border-color: var(--accent); }
.pip.cur  { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 6px var(--accent); }

/* CONTROLS */
#controls {
  flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center; gap: 8px;
}
.diff-group { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.diff-btn {
  padding: 6px 14px; font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase;
  background: var(--bg); border: none; cursor: pointer; color: var(--muted); transition: all .15s;
  border-right: 1px solid var(--border);
}
.diff-btn:last-child { border-right: none; }
.diff-btn.active { background: var(--accent); color: var(--bg); }

.streak-badge {
  margin-left: auto; display: flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
}
#streak-count { color: var(--yellow); font-weight: 600; font-size: 14px; }
#streak-fire { font-size: 16px; display: none; }
#streak-fire.show { display: inline; }

/* OUTLINE PANEL */
#outline-panel {
  flex-shrink: 0; position: relative;
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  height: 260px;
}
#outline-svg { width: 100%; height: 100%; }
#outline-loading {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px;
}
#outline-loading.hidden { display: none; }
.globe-spin {
  width: 40px; height: 40px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#outline-loading p { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; }

/* Round / difficulty label */
#outline-label {
  position: absolute; top: 10px; left: 12px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px;
}
#hint-label {
  position: absolute; bottom: 10px; right: 12px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px;
}

/* ANSWER AREA */
#answer-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

/* MULTIPLE CHOICE */
#mc-grid {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 14px 16px; overflow-y: auto;
}
.mc-btn {
  padding: 12px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  cursor: pointer; transition: all .15s; text-align: center; line-height: 1.3;
}
.mc-btn:hover { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
.mc-btn.correct { background: rgba(34,197,94,.15); border-color: var(--green); color: var(--green); }
.mc-btn.wrong   { background: rgba(239,68,68,.1);  border-color: var(--red);   color: var(--red); opacity: .6; }
.mc-btn:disabled { cursor: not-allowed; }

/* SEARCH MODE */
#search-mode {
  flex: 1; display: flex; flex-direction: column; padding: 14px 16px; gap: 10px; overflow: hidden;
}
#country-search {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
  padding: 11px 14px; border-radius: 6px; outline: none; transition: border-color .2s;
}
#country-search::placeholder { color: var(--muted); }
#country-search:focus { border-color: var(--accent); }
#search-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
.search-btn {
  padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 14px;
  cursor: pointer; text-align: left; transition: all .15s;
}
.search-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
.search-btn.correct { background: rgba(34,197,94,.15); border-color: var(--green); color: var(--green); }
.search-btn.wrong   { background: rgba(239,68,68,.1);  border-color: var(--red);   color: var(--red); }
.search-btn:disabled { cursor: not-allowed; }

/* RESULT OVERLAY */
#result-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(10,15,30,.96); flex-direction: column;
  align-items: center; justify-content: center; padding: 20px; gap: 16px;
}
#result-overlay.show { display: flex; }
#result-outline {
  width: 200px; height: 140px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.rcard {
  width: 100%; max-width: 380px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; padding: 22px; text-align: center;
}
.r-country { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.r-region  { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }
.r-outcome { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
.r-outcome.correct { color: var(--green); }
.r-outcome.wrong   { color: var(--red); }
.r-score { font-family: 'Syne', sans-serif; font-size: 64px; font-weight: 800; color: var(--accent); line-height: 1; }
.r-score-lbl { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
.r-streak { font-size: 13px; color: var(--yellow); margin-bottom: 16px; }
.btn-next {
  width: 100%; background: var(--accent); color: var(--bg);
  font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px;
  border: none; padding: 13px; border-radius: 6px; cursor: pointer;
}
.btn-next:active { opacity: .85; }

/* FINAL */
#final-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(10,15,30,.98); flex-direction: column;
  align-items: center; justify-content: center; padding: 20px; gap: 14px;
}
#final-overlay.show { display: flex; }
.fcard {
  width: 100%; max-width: 380px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; padding: 28px; text-align: center;
}
.f-title { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
.f-score { font-family: 'Syne', sans-serif; font-size: 84px; font-weight: 800; color: var(--accent); line-height: 1; }
.f-max { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.f-streak { font-size: 13px; color: var(--yellow); margin-bottom: 12px; }
.f-grade { font-size: 13px; padding: 4px 16px; border-radius: 20px; display: inline-block; margin-bottom: 20px; font-family: 'JetBrains Mono', monospace; }
.fg-s { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid var(--green-dim); }
.fg-a { background: rgba(79,142,247,.12); color: var(--accent); border: 1px solid var(--accent-dim); }
.fg-b { background: rgba(234,179,8,.12);  color: var(--yellow); border: 1px solid #713f12; }
.fg-c { background: rgba(239,68,68,.1);   color: var(--red);    border: 1px solid var(--red-dim); }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">Country<span>Guessr</span></div>
  <div class="hud">
    <div class="pips" id="pips"></div>
    <div class="hud-block">
      <div class="hud-lbl">Score</div>
      <div class="hud-val" id="hud-score">0</div>
    </div>
  </div>
</header>

<div id="controls">
  <div class="diff-group">
    <button class="diff-btn active" id="diff-easy"   onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn"        id="diff-medium" onclick="setDiff('medium')">Medium</button>
    <button class="diff-btn"        id="diff-hard"   onclick="setDiff('hard')">Hard</button>
  </div>
  <div class="streak-badge">
    <span id="streak-fire">🔥</span>
    <span>Streak:</span>
    <span id="streak-count">0</span>
  </div>
</div>

<div id="outline-panel">
  <div id="outline-loading">
    <div class="globe-spin"></div>
    <p>LOADING WORLD DATA…</p>
  </div>
  <svg id="outline-svg" viewBox="0 0 400 260"></svg>
  <div id="outline-label">ROUND 1 / 5</div>
  <div id="hint-label"></div>
</div>

<div id="answer-area">
  <div id="mc-grid"></div>
  <div id="search-mode" style="display:none">
    <input type="text" id="country-search" placeholder="Type a country name…"
      oninput="filterSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    <div id="search-results"></div>
  </div>
</div>

</div>

<!-- RESULT -->
<div id="result-overlay">
  <svg id="result-outline" viewBox="0 0 400 260"></svg>
  <div class="rcard">
    <div class="r-country" id="r-country">—</div>
    <div class="r-region"  id="r-region">—</div>
    <div class="r-outcome" id="r-outcome">—</div>
    <div class="r-score"   id="r-score">0</div>
    <div class="r-score-lbl">points</div>
    <div class="r-streak"  id="r-streak"></div>
    <button class="btn-next" id="btn-next" onclick="nextRound()">Next Country →</button>
  </div>
</div>

<!-- FINAL -->
<div id="final-overlay">
  <div class="fcard">
    <div class="f-title">Mission Complete</div>
    <div class="f-score" id="f-score">0</div>
    <div class="f-max"   id="f-max"></div>
    <div class="f-streak" id="f-streak"></div>
    <div class="f-grade" id="f-grade"></div>
    <button class="btn-next" onclick="location.reload()">↺ Play Again</button>
  </div>
</div>

const BASE_CORRECT = 1000;
const STREAK_BONUS = 200;

let allCountryIds = [];   // ISO ids available in dataset
let rounds = [], curr = 0, totalScore = 0;

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  buildPips();
  await loadWorld();
  startGame();
});

async function loadWorld() {
  const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  world = await res.json();
  // Get all ISO ids in the dataset
  const topo = topojson.feature(world, world.objects.countries);
  allCountryIds = topo.features
    .map(f => parseInt(f.id))
    .filter(id => COUNTRIES[id]);
  document.getElementById('outline-loading').classList.add('hidden');
}

function buildPips() {
  const c = document.getElementById('pips'); c.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const p = document.createElement('div'); p.className='pip'+(i===0?' cur':''); p.id=`p${i}`; c.appendChild(p);
  }
}

  for (let i = 0; i < TOTAL; i++) {
    const p = document.getElementById(`p${i}`);
    if (p) p.className='pip'+(i<curr?' done':i===curr?' cur':'');
  }
}
function updateHUD() {
  document.getElementById('hud-score').textContent = totalScore.toLocaleString();
  document.getElementById('streak-count').textContent = streak;
  document.getElementById('streak-fire').classList.toggle('show', streak >= 3);
}

function setDiff(d) {
  difficulty = d;
  ['easy','medium','hard'].forEach(x =>
    document.getElementById(`diff-${x}`).classList.toggle('active', x===d)
  );
  startGame();
}

// ─────────────────────────────────────────────
// GAME
// ─────────────────────────────────────────────
function startGame() {
  const shuffled = [...allCountryIds].sort(() => Math.random() - .5);
  rounds = shuffled.slice(0, TOTAL);
  curr = 0; totalScore = 0; streak = 0; maxStreak = 0;
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('final-overlay').classList.remove('show');
  updateHUD(); syncPips();
  loadRound();
}

function loadRound() {
  currentId = rounds[curr];
  answered = false;
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('outline-label').textContent = `ROUND ${curr+1} / ${TOTAL}`;
  syncPips(); updateHUD();
  drawCountry(currentId, 'outline-svg');
  buildAnswerUI();
}

// ─────────────────────────────────────────────
// DRAWING
// ─────────────────────────────────────────────
function drawCountry(id, svgId, small = false) {
  const svgEl = document.getElementById(svgId);
  const W = small ? 200 : 400, H = small ? 140 : 260;
  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svgEl.innerHTML = '';

  const topo = topojson.feature(world, world.objects.countries);
  const feature = topo.features.find(f => parseInt(f.id) === id);
  if (!feature) return;

  // Fit projection to this country
  const proj = d3.geoMercator().fitSize([W - 20, H - 20], feature);
  const pathGen = d3.geoPath().projection(proj);

  const svg = d3.select(`#${svgId}`);

  // Glow filter
  const defs = svg.append('defs');
  const filter = defs.append('filter').attr('id', `glow-${svgId}`);
  filter.append('feGaussianBlur').attr('stdDeviation', small ? 1 : 2).attr('result', 'blur');
  const merge = filter.append('feMerge');
  merge.append('feMergeNode').attr('in', 'blur');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');

  // Draw country shape
  const g = svg.append('g').attr('transform', `translate(10, 10)`);

  g.append('path')
    .datum(feature)
    .attr('d', pathGen)
    .attr('fill', '#1e3a6e')
    .attr('stroke', '#4f8ef7')
    .attr('stroke-width', small ? 1 : 1.5)
    .attr('filter', `url(#glow-${svgId})`);

  // Capital dot (easy mode only, not in small preview)
  if (!small && difficulty === 'easy' && COUNTRIES[id]?.capital) {
    const [lng, lat] = COUNTRIES[id].capital;
    const [cx, cy] = proj([lng, lat]);
    if (cx > 0 && cx < W-20 && cy > 0 && cy < H-20) {
      g.append('circle')
        .attr('cx', cx).attr('cy', cy).attr('r', 4)
        .attr('fill', '#fbbf24')
        .attr('stroke', '#fff').attr('stroke-width', 1.5);
      document.getElementById('hint-label').textContent = '● capital city shown';
    } else {
      document.getElementById('hint-label').textContent = '';
    }
  } else {
    document.getElementById('hint-label').textContent = '';
  }
}

// ─────────────────────────────────────────────
// ANSWER UI
// ─────────────────────────────────────────────
function buildAnswerUI() {
  if (difficulty === 'hard') {
    document.getElementById('mc-grid').style.display = 'none';
    document.getElementById('search-mode').style.display = 'flex';
    document.getElementById('country-search').value = '';
    buildSearchList(Object.values(COUNTRIES).map(c => c.name).sort());
  } else {
    document.getElementById('mc-grid').style.display = 'grid';
    document.getElementById('search-mode').style.display = 'none';
    buildMultipleChoice();
  }
}

function buildMultipleChoice() {
  const grid = document.getElementById('mc-grid'); grid.innerHTML = '';
  const correct = COUNTRIES[currentId].name;
  const count = difficulty === 'easy' ? 4 : 6;

  // Pick wrong answers from same pool
  const wrong = Object.values(COUNTRIES)
    .filter(c => c.name !== correct)
    .sort(() => Math.random() - .5)
    .slice(0, count - 1)
    .map(c => c.name);

  const options = [...wrong, correct].sort(() => Math.random() - .5);

  options.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'mc-btn';
    btn.textContent = name;
    btn.onclick = () => submitGuess(name);
    grid.appendChild(btn);
  });
}

function buildSearchList(names) {
  const container = document.getElementById('search-results'); container.innerHTML = '';
  names.slice(0, 30).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'search-btn';
    btn.textContent = name;
    btn.onclick = () => submitGuess(name);
    container.appendChild(btn);
  });
}

function filterSearch(q) {
  const names = Object.values(COUNTRIES).map(c => c.name).sort();
  const filtered = q ? names.filter(n => n.toLowerCase().includes(q.toLowerCase())) : names;
  buildSearchList(filtered);
}

// ─────────────────────────────────────────────
// GUESS
// ─────────────────────────────────────────────
function submitGuess(name) {
  if (answered) return;
  answered = true;

  const correct = name === COUNTRIES[currentId].name;

  if (correct) {
    streak++;
    maxStreak = Math.max(maxStreak, streak);
  } else {
    streak = 0;
  }

  const streakBonus = correct && streak > 1 ? (streak - 1) * STREAK_BONUS : 0;
  const pts = correct ? BASE_CORRECT + streakBonus : 0;
  totalScore += pts;

  // Highlight buttons
  const allBtns = document.querySelectorAll('.mc-btn, .search-btn');
  allBtns.forEach(btn => {
    if (btn.textContent === COUNTRIES[currentId].name) btn.classList.add('correct');
    else if (btn.textContent === name && !correct) btn.classList.add('wrong');
    btn.disabled = true;
  });

  showResult(correct, pts, streakBonus, name);
}

function showResult(correct, pts, streakBonus, guessed) {
  const country = COUNTRIES[currentId];

  drawCountry(currentId, 'result-outline', true);

  document.getElementById('r-country').textContent = country.name;
  document.getElementById('r-region').textContent = country.region;

  const outcome = document.getElementById('r-outcome');
  outcome.textContent = correct ? '✓ CORRECT' : `✗ ${guessed.toUpperCase()}`;
  outcome.className = 'r-outcome ' + (correct ? 'correct' : 'wrong');

  document.getElementById('r-score').textContent = pts.toLocaleString();

  const streakEl = document.getElementById('r-streak');
  if (correct && streak >= 2) {
    streakEl.textContent = `🔥 ${streak} streak! +${streakBonus} bonus`;
  } else if (!correct) {
    streakEl.textContent = streak > 0 ? '' : 'Streak reset';
  } else {
    streakEl.textContent = '';
  }

  document.getElementById('btn-next').textContent = curr >= TOTAL-1 ? '🏆 Final Score' : 'Next Country →';
  document.getElementById('result-overlay').classList.add('show');
  updateHUD();
}

function nextRound() {
  curr++;
  if (curr >= TOTAL) { showFinal(); return; }
  loadRound();
}

function showFinal() {
  const max = TOTAL * (BASE_CORRECT + (TOTAL-1) * STREAK_BONUS);
  document.getElementById('f-score').textContent = totalScore.toLocaleString();
  document.getElementById('f-max').textContent = `out of ${max.toLocaleString()} possible`;
  document.getElementById('f-streak').textContent = maxStreak >= 3 ? `🔥 Best streak: ${maxStreak}` : '';

  const pct = totalScore / (TOTAL * BASE_CORRECT);
  const g = document.getElementById('f-grade');
  if (pct >= 1)       { g.textContent='🏆 Cartographer';    g.className='f-grade fg-s'; }
  else if (pct >= .8) { g.textContent='🌍 Geographer';      g.className='f-grade fg-a'; }
  else if (pct >= .6) { g.textContent='🗺 Explorer';        g.className='f-grade fg-b'; }
  else                { g.textContent='📍 Tourist';         g.className='f-grade fg-c'; }

  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('final-overlay').classList.add('show');
}
</script>
